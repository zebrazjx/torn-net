<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torn Net — 撕破的网变成飞鸟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fff; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 16px;
      left: 20px;
      color: rgba(0,0,0,0.35);
      font: 12px/1.6 system-ui, sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="hint">拖拽鼠标划破网，碎片化为飞鸟 · 空格撤销</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
<script>
/* ═══════════════════════════════════════
   全局变量
═══════════════════════════════════════ */
let nodeArray = [];
let linkArray = [];
const cutHistory = [];   // 撤销栈（只存 link）
let flocks = [];         // 鸟群数组
let attractor;           // 鸟群吸引点（画布中心）

/* ── 布料参数 ── */
const GRID      = 40;
const FRICTION  = 0.99;
const FORCE_M   = 0.25;
const KNIFE_R   = 10;
const SPEED_LIM = 8;

/* ── 鸟群上限 ── */
const MAX_BIRDS = 300;

/* ═══════════════════════════════════════
   p5.js 入口
═══════════════════════════════════════ */
function setup() {
  createCanvas(windowWidth, windowHeight);
  cursor(CROSS);
  attractor = createVector(width / 2, height / 2);
  buildCloth();
}

function buildCloth() {
  nodeArray = createNodes();
  linkArray = createLinks(nodeArray);
}

function draw() {
  background(255);

  /* ── 布料 ── */
  stroke(0);
  strokeWeight(1);
  fill(255);
  rectMode(CENTER);

  linkArray.forEach(l => l.update());
  nodeArray.forEach(n => n.update());
  linkArray.forEach(l => l.show());
  nodeArray.forEach(n => n.show());

  /* ── 鸟群 ── */
  noStroke();
  flocks.forEach(f => {
    f.flock(flocks);
    f.update();
    f.draw();
  });

  /* ── 撤销快捷键 ── */
  if (keyIsPressed && (key === ' ' || key === 'u' || key === 'U')) undo();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  attractor.set(width / 2, height / 2);
  buildCloth();   // 布料随画布重建；鸟群继续飞
}

/* ═══════════════════════════════════════
   布料节点 & 连线
═══════════════════════════════════════ */
function createNodes() {
  const nodes = [];
  for (let j = 0; j <= GRID; j++) {
    for (let i = 0; i <= GRID; i++) {
      const pinned = (i === 0 || j === 0 || i === GRID || j === GRID);
      const x = map(i, 0, GRID, 0, width  - 1);
      const y = map(j, 0, GRID, 0, height - 1);
      nodes.push(new ClothNode(x, y, pinned));
    }
  }
  return nodes;
}

function createLinks(nodes) {
  const links = [];
  const cellSize = width / GRID;
  nodes.forEach((cur, idx) => {
    nodes.slice(idx + 1).forEach(tgt => {
      if (cur.pos.dist(tgt.pos) <= cellSize + 0.5) {
        if (!(cur.pinned && tgt.pinned))
          links.push(new ClothLink(cur, tgt));
      }
    });
  });
  return links;
}

class ClothNode {
  constructor(x, y, pinned) {
    this.pos    = createVector(x, y);
    this.vel    = createVector(0, 0);
    this.force  = createVector(0, 0);
    this.pinned = pinned;
  }
  show()   { rect(this.pos.x, this.pos.y, 4); }
  update() {
    if (this.pinned) return;
    this.vel.add(this.force.copy().mult(FORCE_M));
    this.vel.limit(SPEED_LIM);
    this.pos.add(this.vel);
    this.force.set(0, 0);
    this.vel.mult(FRICTION);
  }
}

class ClothLink {
  constructor(n1, n2) { this.node1 = n1; this.node2 = n2; }
  getMiddlePoint() { return this.node1.pos.copy().add(this.node2.pos).div(2); }
  show()   { line(this.node1.pos.x, this.node1.pos.y, this.node2.pos.x, this.node2.pos.y); }
  update() {
    const diff = this.node2.pos.copy().sub(this.node1.pos);
    if (!this.node1.pinned) this.node1.force.add(diff);
    if (!this.node2.pinned) this.node2.force.sub(diff);
  }
}

/* ═══════════════════════════════════════
   鼠标拖拽 → 切断 + 生鸟
═══════════════════════════════════════ */
function mouseDragged() {
  const mouse = createVector(mouseX, mouseY);

  linkArray = linkArray.filter(link => {
    const mid  = link.getMiddlePoint();
    const dist = mouse.dist(mid);
    if (dist > KNIFE_R) return true;

    // 切断 → 记录撤销
    cutHistory.push(link);

    // 生成 1~3 只鸟（受上限限制）
    if (flocks.length < MAX_BIRDS) {
      const count = floor(random(1, 4));
      for (let k = 0; k < count && flocks.length < MAX_BIRDS; k++) {
        flocks.push(new Flock(mid.x, mid.y));
      }
    }

    return false;
  });
}

/* ═══════════════════════════════════════
   撤销（恢复 link，鸟不回来）
═══════════════════════════════════════ */
function undo() {
  if (!cutHistory.length) return;
  linkArray.push(cutHistory.pop());
}

/* ═══════════════════════════════════════
   Flock（Boid）鸟类
═══════════════════════════════════════ */
class Flock {
  constructor(x, y) {
    this.position     = createVector(
      x + random(-6, 6),
      y + random(-6, 6)
    );
    this.baseMaxSpeed = random(1.2, 2.5);
    // 初速度偏向上方，模拟"飞起"感
    this.velocity = createVector(random(-1, 1), random(-2.5, -0.5))
                      .setMag(random(1.5, 3));
    this.acceleration = createVector();
    this.maxSpeed     = this.baseMaxSpeed;
    this.maxForce     = 0.05;
    this.size         = 6;

    this.separationDist   = 14;
    this.alignDist        = 90;
    this.cohesionDist     = 90;
    this.separationWeight = 1.5;
    this.alignWeight      = 1;
    this.cohesionWeight   = 1;

    this.flapSpeed   = 0.18;
    this.flapAmp     = 16;
    this.flapPhase   = random(TWO_PI);
    this.noiseOffset = random(1000);
  }

  applyForce(f) { this.acceleration.add(f); }

  flock(others) {
    this.applyForce(this.separate(others).mult(this.separationWeight));
    this.applyForce(this.align(others).mult(this.alignWeight));
    this.applyForce(this.cohere(others).mult(this.cohesionWeight));
    // 微弱吸引中心，让鸟群不无限扩散
    this.applyForce(this.seek(attractor).mult(0.004));
    // Perlin 噪声扰动，增加自然感
    const nx = (noise(this.position.x * 0.005 + this.noiseOffset, this.position.y * 0.005) * 2 - 1) * 0.18;
    const ny = (noise(this.position.y * 0.005 + this.noiseOffset, this.position.x * 0.005) * 2 - 1) * 0.18;
    this.applyForce(createVector(nx, ny));
  }

  update() {
    this.maxSpeed = this.velocity.y < 0
      ? this.baseMaxSpeed * 0.85
      : this.baseMaxSpeed * 1.15;

    this.velocity.add(this.acceleration).limit(this.maxSpeed);
    this.position.add(this.velocity);
    this.acceleration.set(0, 0);
    this.avoidEdges();

    this.flapPhase = (this.flapPhase + this.flapSpeed + this.velocity.mag() * 0.04) % TWO_PI;
  }

  avoidEdges() {
    const margin = width * 0.05;
    const steer  = createVector();
    if (this.position.x < margin)          steer.x =  this.maxSpeed * (margin - this.position.x) / margin;
    if (this.position.x > width - margin)  steer.x = -this.maxSpeed * (this.position.x - (width - margin)) / margin;
    if (this.position.y < margin)          steer.y =  this.maxSpeed * (margin - this.position.y) / margin;
    if (this.position.y > height - margin) steer.y = -this.maxSpeed * (this.position.y - (height - margin)) / margin;
    this.applyForce(steer.limit(this.maxForce));
  }

  separate(others) {
    let steer = createVector(), count = 0;
    for (const o of others) {
      const d = this.position.dist(o.position);
      if (d > 0 && d < this.separationDist) {
        steer.add(this.position.copy().sub(o.position).normalize().div(d));
        count++;
      }
    }
    if (count) steer.div(count);
    if (steer.mag() > 0) steer.normalize().mult(this.maxSpeed).sub(this.velocity).limit(this.maxForce);
    return steer;
  }

  align(others) {
    let sum = createVector(), count = 0;
    for (const o of others) {
      if (this.position.dist(o.position) < this.alignDist) { sum.add(o.velocity); count++; }
    }
    if (count) return sum.div(count).normalize().mult(this.maxSpeed).sub(this.velocity).limit(this.maxForce);
    return createVector();
  }

  cohere(others) {
    let sum = createVector(), count = 0;
    for (const o of others) {
      if (this.position.dist(o.position) < this.cohesionDist) { sum.add(o.position); count++; }
    }
    if (count) return this.seek(sum.div(count));
    return createVector();
  }

  seek(target) {
    return target.copy().sub(this.position).normalize().mult(this.maxSpeed)
           .sub(this.velocity).limit(this.maxForce);
  }

  draw() {
    push();
    translate(this.position.x, this.position.y);
    rotate(this.velocity.heading());

    const fo = sin(this.flapPhase) * this.flapAmp;
    const s  = this.size;
    fill('rgba(0,0,0,0.88)');
    noStroke();

    // 左翅
    beginShape();
    vertex(-s, 0);
    quadraticVertex(-s * 3, -fo, -s * 2, 0);
    quadraticVertex(-s * 3,  fo, -s,     0);
    endShape(CLOSE);

    // 右翅
    beginShape();
    vertex(-s, 0);
    quadraticVertex(-s * 3,  fo, -s * 2, 0);
    quadraticVertex(-s * 3, -fo, -s,     0);
    endShape(CLOSE);

    pop();
  }
}
</script>
</body>
</html>
